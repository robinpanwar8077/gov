services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: govpronet-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/govpronet
      - NODE_ENV=production
      - S3_ENDPOINT=http://minio:9000
    depends_on:
      - postgres
      - minio
    volumes:
      - ./uploads:/uploads

  postgres:
    image: postgres:15
    container_name: govpronet-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: govpronet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: govpronet-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadminpassword;
      /usr/bin/mc mb myminio/govpronet;
      /usr/bin/mc policy set public myminio/govpronet;
      exit 0;
      "

  prisma:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
    command: >
      sh -c "
      npm ci &&
      npx prisma migrate deploy
      "

volumes:
  postgres_data:
  minio_data:
