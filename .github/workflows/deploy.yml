name: Deploy GovProNet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/gov_pro_net_system
            git fetch origin
            git reset --hard origin/main

            docker compose down
            docker compose build --no-cache app
            docker compose up -d

            docker compose run --rm prisma sh -c "npm ci && npx prisma generate && npx prisma db push --accept-data-loss && npx prisma db seed"
